<!-- UI Не изменять он идеальный -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer">
  <title>AETHER - Sequential Art Generator</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">

  <link rel="stylesheet" href="assets/css/material-symbols-local.css">
  <link rel="stylesheet" href="assets/css/main.css">

  <script src="libs/p5.js"></script>
  <script src="libs/gl-matrix-min.js"></script>
  <script src="libs/ray.js"></script>
</head>

<body>
  <div id="canvas-container"></div>
  <div id="ui">
    <a id="home-link" href="./" title="Home">
      <img id="logo" src="assets/logo.svg" alt="Logo">
    </a>

    <div id="left-ui">
      <!-- Palette Selection -->
      <div id="palette-wrap">
        <div id="palette-indicator" title="Current Palette"></div>
        <div id="palette-dropdown">
          <div id="palette-tabs">
            <div class="palette-tab active" data-category="all">All</div>
            <div class="palette-tab" data-category="nature">Nature</div>
            <div class="palette-tab" data-category="floral">Floral</div>
            <div class="palette-tab" data-category="atmosphere">Atmosphere</div>
            <div class="palette-tab" data-category="vivid">Vivid</div>
            <div class="palette-tab" data-category="earth">Earth</div>
            <div class="palette-tab" data-category="cool">Cool</div>
          </div>
          <div id="palette-grid">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- Link to Pure (Color Lab replacement) -->
      <a href="https://oleksnd.github.io/Pure/" id="pure-btn" title="Pure Colors" target="_blank" rel="noopener noreferrer">
        <span class="material-symbols-outlined">science</span>
      </a>

      <!-- Global Brush thickness slider (shown for styles that support thickness control) -->
      <div id="brush-thickness-wrap">
        <label for="brush-thickness">Thickness</label>
        <input id="brush-thickness" type="range" min="0.1" max="1.5" step="0.05" value="1">
        <span id="brush-thickness-value">1.00</span>
      </div>
    </div>

    <!-- Export + overlay toggle (top-right) -->
    <div id="export-wrap">
      <!-- Label for overlay toggle -->
      <span id="overlay-label">Grid</span>
      <!-- Overlay visibility toggle -->
      <button id="overlay-toggle" title="Toggle overlays" aria-pressed="true" aria-label="Toggle overlays"
        class="toggle on"><span class="toggle-knob" aria-hidden="true"></span></button>

      <!-- A-Z toggle: show letters A-Z in order (default: ON). Turn OFF to randomize letters -->
      <span id="az-label">A-Z</span>
      <button id="az-toggle" title="Toggle A-Z (alphabetical)" aria-pressed="true" aria-label="Toggle A-Z"
        class="toggle on"><span class="toggle-knob" aria-hidden="true"></span></button>

      <!-- DARK mode toggle -->
      <span id="dark-label">Dark</span>
      <button id="dark-toggle" title="Toggle Dark Mode" aria-pressed="false" aria-label="Toggle Dark Mode"
        class="toggle"><span class="toggle-knob" aria-hidden="true"></span></button>

      <!-- Style selector: choose rendering preset -->
      <select id="styleSelector" aria-label="Rendering style">
        <option value="aether-soft">Aether Soft</option>
        <option value="aether-soft-modern">Aether Soft Modern</option>
        <option value="liquid-ink">Liquid Ink</option>
        <option value="oil-brush">Oil Brush</option>
        <option value="splatter">Splatter</option>
        <option value="fractal-tree">Fractal Tree</option>
        <option value="torn-wet-brush">Torn Wet Brush</option>
        <option value="ray-collage">Ray Collage</option>
      </select>

      <!-- Export icon (Material Symbol) -->
      <button id="export-btn" title="Export PNG" aria-label="Export PNG"><span class="material-symbols-outlined"
          aria-hidden="true">save</span></button>
    </div>

    <div id="input-container">
      <div id="text-area-wrap">
        <textarea id="text-input">Small Things</textarea>
        <div id="word-toggles">
          <!-- checkboxes for each parsed word will be rendered here -->
        </div>
      </div>
      <div>
        <button id="generate-btn">Generate</button>
      </div>
    </div>
  </div>
  <!-- Core application scripts -->
  <script src="dna.js"></script>
  <script src="palettes/palette.js"></script>
  <script src="diffusion.js"></script>
  <script src="sketch.js"></script>

  <!-- UI Scripts -->
  <script src="js/ui-handlers.js"></script>
  <script src="js/engine-loader.js"></script>
  <script src="js/palette-ui.js"></script>
  <script src="js/word-toggles.js"></script>
</body>

</html>
